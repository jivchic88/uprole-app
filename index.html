<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>UpRole</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       TOKENS
    ============================================================ */
    :root {
      --bg:            #07071a;
      --glass:         rgba(255,255,255,0.055);
      --glass-border:  rgba(255,255,255,0.11);
      --glass-hover:   rgba(255,255,255,0.09);
      --text:          #ffffff;
      --text-60:       rgba(255,255,255,0.60);
      --text-80:       rgba(255,255,255,0.82);
      --accent:        #7c5cff;
      --accent2:       #00c8ff;
      --green:         #00e676;
      --gold:          #ffd04d;
      --pink:          #ff6baa;
      --boss-red:      #ff4353;
      --boss-orange:   #ff9f43;
      --r:             18px;
      --r-sm:          12px;
    }

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       ANIMATED BACKGROUND
    ============================================================ */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      will-change: transform;
    }
    .orb-1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(110,60,255,0.55) 0%, transparent 70%);
      top: -160px; left: -120px;
      animation: float1 14s ease-in-out infinite;
    }
    .orb-2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(0,180,255,0.45) 0%, transparent 70%);
      top: 25%; right: -100px;
      animation: float2 17s ease-in-out infinite;
    }
    .orb-3 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255,80,150,0.35) 0%, transparent 70%);
      bottom: 15%; left: 5%;
      animation: float3 11s ease-in-out infinite;
    }
    .orb-4 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(0,230,118,0.25) 0%, transparent 70%);
      bottom: -60px; right: 10%;
      animation: float1 19s ease-in-out infinite reverse;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(40px,-35px) scale(1.07); }
      70%      { transform: translate(-20px,25px) scale(0.93); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      35%      { transform: translate(-30px,40px) scale(0.95); }
      65%      { transform: translate(20px,-20px) scale(1.06); }
    }
    @keyframes float3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(25px,-30px) scale(1.1); }
    }

    /* Boss mode overrides */
    .boss-mode .orb-1 {
      background: radial-gradient(circle, rgba(255,67,83,0.55) 0%, transparent 70%);
    }
    .boss-mode .orb-2 {
      background: radial-gradient(circle, rgba(255,159,67,0.45) 0%, transparent 70%);
    }
    .boss-mode .orb-3 {
      background: radial-gradient(circle, rgba(255,67,83,0.35) 0%, transparent 70%);
    }

    /* ============================================================
       LAYOUT
    ============================================================ */
    .app {
      position: relative; z-index: 1;
      max-width: 430px; margin: 0 auto;
      padding-bottom: 110px;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    .header {
      padding: 18px 16px 0;
      position: sticky; top: 0; z-index: 200;
      background: linear-gradient(to bottom,
        rgba(7,7,26,0.96) 75%, transparent);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .header-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
      margin-bottom: 14px;
    }

    /* Pill badges */
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px;
      border-radius: 100px;
      font-size: 12.5px; font-weight: 600;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .pill-day  { color: var(--accent2); border-color: rgba(0,200,255,0.22); background: rgba(0,200,255,0.08); }
    .pill-day .muted { color: var(--text-60); }
    .pill-xp   {
      color: var(--gold);
      border-color: rgba(255,208,77,0.28);
      background: rgba(255,208,77,0.08);
      position: relative; overflow: hidden;
    }
    .pill-xp::after {
      content: '';
      position: absolute; top: 0; left: -120%; width: 60%; height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,208,77,0.35),transparent);
      animation: sweep 3.5s ease-in-out infinite;
    }
    @keyframes sweep { 0%{left:-120%} 60%,100%{left:160%} }

    .pill-boss {
      color: var(--boss-red);
      border-color: rgba(255,67,83,0.38);
      background: rgba(255,67,83,0.12);
      animation: pulseBoss 1.8s ease-in-out infinite;
    }
    @keyframes pulseBoss {
      0%,100%{box-shadow:0 0 0 0 rgba(255,67,83,0.25)}
      50%{box-shadow:0 0 0 7px rgba(255,67,83,0)}
    }

    .lesson-title {
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.4px; line-height: 1.22;
      padding-bottom: 18px;
    }

    /* ============================================================
       TABS
    ============================================================ */
    .tabs {
      display: flex; gap: 7px;
      padding: 0 16px 14px;
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 17px;
      border-radius: 100px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-60);
      font-size: 13.5px; font-weight: 600;
      cursor: pointer;
      transition: color .2s, background .2s, box-shadow .2s, border-color .2s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    .tab-btn:active { transform: scale(0.96); }
    .tab-btn.active {
      background: linear-gradient(130deg, var(--accent) 0%, var(--accent2) 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 22px rgba(100,75,255,0.38);
    }
    .boss-mode .tab-btn.active {
      background: linear-gradient(130deg, var(--boss-red) 0%, var(--boss-orange) 100%);
      box-shadow: 0 4px 22px rgba(255,67,83,0.35);
    }

    /* ============================================================
       TAB PANELS
    ============================================================ */
    .panel { display: none; padding: 0 16px; animation: panelIn .28s ease; }
    .panel.active { display: block; }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       GLASS CARD BASE
    ============================================================ */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 12px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card-label {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .card-label-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .l-theory   { background: rgba(124,92,255,.22); }
    .l-book     { background: rgba(0,200,255,.18); }
    .l-task     { background: rgba(0,230,118,.18); }
    .l-iv       { background: rgba(255,208,77,.18); }
    .l-glossary { background: rgba(255,107,170,.18); }

    .card-label-text {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .9px;
      color: var(--text-60);
    }

    /* ============================================================
       BOSS BATTLE BANNER
    ============================================================ */
    .boss-banner {
      display: none;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg,
        rgba(255,67,83,.14) 0%, rgba(255,159,67,.14) 100%);
      border: 1px solid rgba(255,67,83,.28);
      border-radius: var(--r);
      padding: 22px 20px;
      margin-bottom: 12px;
      text-align: center;
    }
    .boss-banner::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% -20%,
        rgba(255,67,83,.25) 0%, transparent 65%);
    }
    .boss-banner-emoji { font-size: 40px; line-height: 1; margin-bottom: 8px; }
    .boss-banner-title {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(130deg, var(--boss-red), var(--boss-orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }
    .boss-banner-sub {
      font-size: 13.5px; color: var(--text-60); line-height: 1.5;
    }

    /* ============================================================
       THEORY TEXT
    ============================================================ */
    .body-text {
      font-size: 15px; line-height: 1.72;
      color: var(--text-80);
    }
    .body-text p { margin-bottom: 13px; }
    .body-text p:last-child { margin-bottom: 0; }

    /* ============================================================
       BOOK CARD
    ============================================================ */
    .book-card {
      border-left: 3px solid var(--accent2);
      background: rgba(0,200,255,.05);
      border-top-left-radius: 4px;
      border-bottom-left-radius: 4px;
    }
    .book-source {
      font-size: 12.5px; font-weight: 600; font-style: italic;
      color: var(--accent2); margin-bottom: 10px;
    }
    .book-text {
      font-size: 14px; line-height: 1.68;
      color: rgba(255,255,255,.75);
      font-style: italic;
    }

    /* ============================================================
       TASK CARD
    ============================================================ */
    .task-card {
      background: rgba(0,230,118,.07);
      border-color: rgba(0,230,118,.2);
      position: relative; overflow: hidden;
    }
    .task-card::after {
      content: '';
      position: absolute; top: -50px; right: -50px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(0,230,118,.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ============================================================
       INTERVIEW CARD
    ============================================================ */
    .iv-question {
      font-size: 15.5px; font-weight: 600;
      line-height: 1.5; color: rgba(255,255,255,.92);
      margin-bottom: 14px;
    }
    .hint-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 16px;
      border-radius: var(--r-sm);
      background: rgba(255,208,77,.08);
      border: 1px solid rgba(255,208,77,.22);
      color: var(--gold);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .hint-btn:hover { background: rgba(255,208,77,.14); }
    .hint-body {
      display: none;
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: var(--r-sm);
      background: rgba(255,208,77,.06);
      border: 1px solid rgba(255,208,77,.15);
      font-size: 14px; line-height: 1.65;
      color: var(--text-80);
      animation: panelIn .22s ease;
    }
    .hint-body.open { display: block; }

    /* ============================================================
       PROGRESS ROW
    ============================================================ */
    .stat-row {
      display: flex; gap: 10px;
      padding: 16px;
    }
    .stat-cell {
      flex: 1; text-align: center;
      padding: 15px 8px;
      border-radius: var(--r-sm);
      background: var(--glass);
      border: 1px solid var(--glass-border);
    }
    .stat-val {
      font-size: 26px; font-weight: 800;
      background: linear-gradient(130deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }
    .boss-mode .stat-val {
      background: linear-gradient(130deg, var(--boss-red), var(--boss-orange));
      -webkit-background-clip: text;
    }
    .stat-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .7px;
      color: var(--text-60); margin-top: 4px;
    }

    /* ============================================================
       GLOSSARY
    ============================================================ */
    .glossary-list { display: flex; flex-direction: column; gap: 9px; }
    .glossary-item {
      padding: 13px 15px;
      border-radius: var(--r-sm);
      background: rgba(255,107,170,.07);
      border: 1px solid rgba(255,107,170,.16);
    }
    .glossary-term {
      font-size: 13.5px; font-weight: 700;
      color: var(--pink); margin-bottom: 4px;
    }
    .glossary-def {
      font-size: 13px; line-height: 1.55;
      color: var(--text-60);
    }

    /* ============================================================
       BOTTOM BAR + DONE BUTTON
    ============================================================ */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 14px 16px max(14px, env(safe-area-inset-bottom));
      background: linear-gradient(to top,
        rgba(7,7,26,0.98) 55%, transparent);
      z-index: 300;
    }
    .done-btn {
      width: 100%;
      padding: 16px;
      border-radius: var(--r);
      border: none; cursor: pointer;
      background: linear-gradient(130deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      font-size: 16px; font-weight: 700;
      letter-spacing: .2px;
      box-shadow: 0 8px 32px rgba(100,75,255,.38);
      transition: transform .18s, box-shadow .18s, background .4s;
    }
    .done-btn:active { transform: scale(0.97); box-shadow: 0 3px 14px rgba(100,75,255,.25); }
    .done-btn.success {
      background: linear-gradient(130deg, #00c875, #00e676) !important;
      box-shadow: 0 8px 32px rgba(0,200,100,.35) !important;
    }
    .boss-mode .done-btn {
      background: linear-gradient(130deg, var(--boss-red) 0%, var(--boss-orange) 100%);
      box-shadow: 0 8px 32px rgba(255,67,83,.38);
    }

    /* ============================================================
       UTIL
    ============================================================ */
    .hidden { display: none !important; }
    .mt-4  { margin-top: 4px; }
    .mt-12 { margin-top: 12px; }
  </style>
</head>
<body>

<!-- ═══ Animated orbs ═══ -->
<div class="bg" id="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<div class="app" id="app">

  <!-- ─── Header ─── -->
  <div class="header">
    <div class="header-row">
      <span class="pill pill-day" id="dayPill">
        <span class="muted">День</span>
        <strong id="hDay">—</strong>
        <span class="muted">·</span>
        <span class="muted">Нед.</span>
        <strong id="hWeek">—</strong>
      </span>
      <span class="pill pill-xp" id="xpPill">⚡ <span id="hXP">0</span> XP</span>
    </div>
    <h1 class="lesson-title" id="hTitle">Загрузка...</h1>
  </div>

  <!-- ─── Tabs ─── -->
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="theory"  onclick="go('theory',this)">📚 Теория</button>
    <button class="tab-btn"        data-tab="task"    onclick="go('task',this)"  id="btnTask">🎯 Задание</button>
    <button class="tab-btn"        data-tab="extra"   onclick="go('extra',this)" id="btnExtra">💡 Ещё</button>
  </div>

  <!-- ═══════════════ PANEL: THEORY ═══════════════ -->
  <div class="panel active" id="p-theory">

    <!-- Boss battle banner -->
    <div class="boss-banner" id="bossBanner">
      <div class="boss-banner-emoji">⚔️</div>
      <div class="boss-banner-title">Босс-битва!</div>
      <div class="boss-banner-sub">Финальный урок недели.<br>Покажи всё, чему научился.</div>
    </div>

    <!-- Theory -->
    <div class="card">
      <div class="card-label">
        <div class="card-label-icon l-theory">📚</div>
        <span class="card-label-text">Теория</span>
      </div>
      <div class="body-text" id="theoryBody"></div>
    </div>

    <!-- Book excerpt -->
    <div class="card book-card hidden" id="bookCard">
      <div class="card-label">
        <div class="card-label-icon l-book">📖</div>
        <span class="card-label-text">Из книги</span>
      </div>
      <div class="book-source" id="bookSource"></div>
      <div class="book-text"   id="bookBody"></div>
    </div>

  </div>

  <!-- ═══════════════ PANEL: TASK ═══════════════ -->
  <div class="panel" id="p-task">

    <!-- Task -->
    <div class="card task-card">
      <div class="card-label">
        <div class="card-label-icon l-task">🎯</div>
        <span class="card-label-text">Задание</span>
      </div>
      <div class="body-text" id="taskBody"></div>
    </div>

    <!-- Interview Q -->
    <div class="card hidden" id="ivCard">
      <div class="card-label">
        <div class="card-label-icon l-iv">🎤</div>
        <span class="card-label-text">Вопрос на интервью</span>
      </div>
      <div class="iv-question" id="ivQ"></div>
      <div class="hint-btn" id="hintBtn" onclick="toggleHint()">💡 Показать подсказку</div>
      <div class="hint-body"  id="hintBody"></div>
    </div>

  </div>

  <!-- ═══════════════ PANEL: EXTRA ═══════════════ -->
  <div class="panel" id="p-extra">

    <!-- Stats -->
    <div class="card stat-row" style="padding:16px; gap:10px;">
      <div class="stat-cell">
        <div class="stat-val" id="sDday">—</div>
        <div class="stat-label">День</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="sWeek">—</div>
        <div class="stat-label">Неделя</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="sXP" style="font-size:20px;">—</div>
        <div class="stat-label">Награда</div>
      </div>
    </div>

    <!-- Glossary -->
    <div class="card hidden" id="glossaryCard">
      <div class="card-label">
        <div class="card-label-icon l-glossary">📝</div>
        <span class="card-label-text">Глоссарий</span>
      </div>
      <div class="glossary-list" id="glossaryList"></div>
    </div>

  </div>

</div><!-- /app -->

<!-- ─── Bottom action ─── -->
<div class="bottom-bar">
  <button class="done-btn" id="doneBtn" onclick="done()">Урок прочитан ✓</button>
</div>


<script>
/* ================================================================
   TELEGRAM WEB APP INIT
================================================================ */
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

/* ================================================================
   PARSE INCOMING DATA
   Supports: URL query params + URL hash base64-JSON fallback
================================================================ */
function getData() {
  const q   = new URLSearchParams(window.location.search);
  let   hd  = {};
  try {
    const h = window.location.hash.slice(1);
    if (h) hd = JSON.parse(atob(h));
  } catch(_) {}

  const get = (k, def='') => q.get(k) || hd[k] || def;

  return {
    day:      get('day',   '1'),
    week:     get('week',  '1'),
    title:    get('title', 'Урок'),
    xp:       get('xp',   '0'),
    theory:   get('theory'),
    bookTitle:get('book_title'),
    bookText: get('book_text'),
    task:     get('task'),
    ivQ:      get('interview_q'),
    ivHint:   get('interview_hint'),
    glossary: get('glossary'),
    isBoss:   get('is_boss','false'),
  };
}

/* ================================================================
   HELPERS
================================================================ */
// Convert newline-separated string to <p> tags
function toParagraphs(raw) {
  if (!raw) return '';
  return raw.split(/\n+/)
    .map(s => s.trim()).filter(Boolean)
    .map(s => `<p>${s}</p>`)
    .join('');
}

// Parse "Term: def\nTerm2: def2" → [{term, def}]
function parseGlossary(raw) {
  if (!raw) return [];
  return raw.split(/\n+/)
    .map(l => l.trim()).filter(Boolean)
    .map(l => {
      const i = l.indexOf(':');
      return i > 0
        ? { term: l.slice(0,i).trim(), def: l.slice(i+1).trim() }
        : { term: l, def: '' };
    });
}

function show(id)   { document.getElementById(id).classList.remove('hidden'); }
function setText(id, val) { document.getElementById(id).textContent = val; }
function setHTML(id, val) { document.getElementById(id).innerHTML   = val; }

/* ================================================================
   RENDER
================================================================ */
function render() {
  const d = getData();
  const boss = d.isBoss === 'true' || d.isBoss === '1';

  // Boss mode
  if (boss) {
    document.getElementById('app').classList.add('boss-mode');
    document.getElementById('bg').classList.add('boss-mode');
    show('bossBanner');
    document.getElementById('xpPill').innerHTML = `⚔️ <span id="hXP">${d.xp}</span> XP`;
  }

  // Header
  setText('hDay',  d.day);
  setText('hWeek', d.week);
  setText('hXP',   d.xp);
  setText('hTitle', d.title);

  // Stats
  setText('sDday', d.day);
  setText('sWeek', d.week);
  setText('sXP',   d.xp + ' ⚡');

  // Theory
  setHTML('theoryBody', toParagraphs(d.theory));

  // Book
  if (d.bookText) {
    show('bookCard');
    setText('bookSource', d.bookTitle || 'Из книги');
    setHTML('bookBody',   toParagraphs(d.bookText));
  }

  // Task
  setHTML('taskBody', toParagraphs(d.task));

  // Interview
  if (d.ivQ) {
    show('ivCard');
    setText('ivQ', d.ivQ);
    setText('hintBody', d.ivHint || '');
    if (!d.ivHint) document.getElementById('hintBtn').classList.add('hidden');
  }

  // Glossary
  const terms = parseGlossary(d.glossary);
  if (terms.length) {
    show('glossaryCard');
    setHTML('glossaryList', terms.map(t => `
      <div class="glossary-item">
        <div class="glossary-term">${t.term}</div>
        ${t.def ? `<div class="glossary-def">${t.def}</div>` : ''}
      </div>`).join(''));
  }
}

/* ================================================================
   TAB SWITCHING
================================================================ */
function go(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('p-' + id).classList.add('active');
  btn.classList.add('active');
}

/* ================================================================
   HINT TOGGLE
================================================================ */
function toggleHint() {
  const body = document.getElementById('hintBody');
  const btn  = document.getElementById('hintBtn');
  const open = body.classList.toggle('open');
  btn.textContent = open ? '✕ Скрыть подсказку' : '💡 Показать подсказку';
}

/* ================================================================
   DONE BUTTON
================================================================ */
function done() {
  const btn = document.getElementById('doneBtn');
  btn.textContent = '✅ Отлично! +' + (getData().xp) + ' XP';
  btn.classList.add('success');

  // Send event back to Telegram Bot (Make.com can catch this)
  try {
    tg.sendData(JSON.stringify({ action: 'lesson_done', day: getData().day }));
  } catch(_) {}

  setTimeout(() => { try { tg.close(); } catch(_) {} }, 1400);
}

/* ================================================================
   BOOT
================================================================ */
render();
</script>
</body>
</html>
