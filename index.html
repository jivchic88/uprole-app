<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>UpRole</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #07071a;
      --glass:         rgba(255,255,255,0.055);
      --glass-border:  rgba(255,255,255,0.11);
      --glass-hover:   rgba(255,255,255,0.09);
      --text:          #ffffff;
      --text-60:       rgba(255,255,255,0.60);
      --text-80:       rgba(255,255,255,0.82);
      --accent:        #7c5cff;
      --accent2:       #00c8ff;
      --green:         #00e676;
      --gold:          #ffd04d;
      --pink:          #ff6baa;
      --boss-red:      #ff4353;
      --boss-orange:   #ff9f43;
      --r:             18px;
      --r-sm:          12px;
    }
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); will-change: transform; }
    .orb-1 { width:480px;height:480px;background:radial-gradient(circle,rgba(110,60,255,.55)0%,transparent 70%);top:-160px;left:-120px;animation:float1 14s ease-in-out infinite; }
    .orb-2 { width:380px;height:380px;background:radial-gradient(circle,rgba(0,180,255,.45)0%,transparent 70%);top:25%;right:-100px;animation:float2 17s ease-in-out infinite; }
    .orb-3 { width:320px;height:320px;background:radial-gradient(circle,rgba(255,80,150,.35)0%,transparent 70%);bottom:15%;left:5%;animation:float3 11s ease-in-out infinite; }
    .orb-4 { width:260px;height:260px;background:radial-gradient(circle,rgba(0,230,118,.25)0%,transparent 70%);bottom:-60px;right:10%;animation:float1 19s ease-in-out infinite reverse; }
    @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(40px,-35px) scale(1.07)} 70%{transform:translate(-20px,25px) scale(.93)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 35%{transform:translate(-30px,40px) scale(.95)} 65%{transform:translate(20px,-20px) scale(1.06)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(25px,-30px) scale(1.1)} }
    @keyframes sweep   { 0%{left:-120%} 60%,100%{left:160%} }
    @keyframes pulseBoss { 0%,100%{box-shadow:0 0 0 0 rgba(255,67,83,.25)} 50%{box-shadow:0 0 0 7px rgba(255,67,83,0)} }
    @keyframes panelIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn   { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }

    .boss-mode .orb-1 { background:radial-gradient(circle,rgba(255,67,83,.55)0%,transparent 70%); }
    .boss-mode .orb-2 { background:radial-gradient(circle,rgba(255,159,67,.45)0%,transparent 70%); }
    .boss-mode .orb-3 { background:radial-gradient(circle,rgba(255,67,83,.35)0%,transparent 70%); }

    /* ── LAYOUT ── */
    .app { position:relative;z-index:1;max-width:430px;margin:0 auto;padding-bottom:120px; }

    /* ── HEADER ── */
    .header {
      padding:18px 16px 0;
      position:sticky;top:0;z-index:200;
      background:linear-gradient(to bottom,rgba(7,7,26,.97) 75%,transparent);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    }
    .header-row { display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px; }

    .pill { display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:100px;font-size:12.5px;font-weight:600;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);white-space:nowrap; }
    .pill-day  { color:var(--accent2);border-color:rgba(0,200,255,.22);background:rgba(0,200,255,.08); }
    .pill-day .muted { color:var(--text-60); }
    .pill-xp   { color:var(--gold);border-color:rgba(255,208,77,.28);background:rgba(255,208,77,.08);position:relative;overflow:hidden; }
    .pill-xp::after { content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,208,77,.35),transparent);animation:sweep 3.5s ease-in-out infinite; }
    .pill-boss { color:var(--boss-red);border-color:rgba(255,67,83,.38);background:rgba(255,67,83,.12);animation:pulseBoss 1.8s ease-in-out infinite; }

    .lesson-title { font-size:21px;font-weight:800;letter-spacing:-.4px;line-height:1.22;padding-bottom:18px; }

    /* ── TABS ── */
    .tabs { display:flex;gap:7px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab-btn { flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 17px;border-radius:100px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text-60);font-size:13.5px;font-weight:600;cursor:pointer;transition:color .2s,background .2s,box-shadow .2s,border-color .2s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);white-space:nowrap; }
    .tab-btn:active { transform:scale(.96); }
    .tab-btn.active { background:linear-gradient(130deg,var(--accent) 0%,var(--accent2) 100%);border-color:transparent;color:#fff;box-shadow:0 4px 22px rgba(100,75,255,.38); }
    .boss-mode .tab-btn.active { background:linear-gradient(130deg,var(--boss-red) 0%,var(--boss-orange) 100%);box-shadow:0 4px 22px rgba(255,67,83,.35); }

    /* ── PANELS ── */
    .panel { display:none;padding:0 16px;animation:panelIn .28s ease; }
    .panel.active { display:block; }

    /* ── GLASS CARD ── */
    .card { background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:20px;margin-bottom:12px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px); }
    .card-label { display:flex;align-items:center;gap:8px;margin-bottom:14px; }
    .card-label-icon { width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0; }
    .l-theory   { background:rgba(124,92,255,.22); }
    .l-book     { background:rgba(0,200,255,.18); }
    .l-task     { background:rgba(0,230,118,.18); }
    .l-iv       { background:rgba(255,208,77,.18); }
    .l-glossary { background:rgba(255,107,170,.18); }
    .l-quiz     { background:rgba(45,212,191,.2); }
    .card-label-text { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text-60); }

    /* ── BOSS BANNER ── */
    .boss-banner { display:none;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(255,67,83,.14)0%,rgba(255,159,67,.14)100%);border:1px solid rgba(255,67,83,.28);border-radius:var(--r);padding:22px 20px;margin-bottom:12px;text-align:center; }
    .boss-banner::before { content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -20%,rgba(255,67,83,.25)0%,transparent 65%); }
    .boss-banner-emoji { font-size:40px;line-height:1;margin-bottom:8px; }
    .boss-banner-title { font-size:22px;font-weight:800;background:linear-gradient(130deg,var(--boss-red),var(--boss-orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px; }
    .boss-banner-sub   { font-size:13.5px;color:var(--text-60);line-height:1.5; }

    /* ── BODY TEXT ── */
    .body-text { font-size:15px;line-height:1.72;color:var(--text-80); }
    .body-text p { margin-bottom:12px; }
    .body-text p:last-child { margin-bottom:0; }
    .body-text ul { padding-left:20px;margin-bottom:12px; }
    .body-text li { margin-bottom:6px; }
    .body-text strong { color:#fff; }

    /* ── BOOK CARD ── */
    .book-card { border-left:3px solid var(--accent2);background:rgba(0,200,255,.05);border-top-left-radius:4px;border-bottom-left-radius:4px; }
    .book-source { font-size:12.5px;font-weight:600;font-style:italic;color:var(--accent2);margin-bottom:10px; }
    .book-text   { font-size:14px;line-height:1.68;color:rgba(255,255,255,.75);font-style:italic; }
    .book-text p { margin-bottom:10px; }
    .book-text p:last-child { margin-bottom:0; }

    /* ── TASK CARD ── */
    .task-card { background:rgba(0,230,118,.07);border-color:rgba(0,230,118,.2);position:relative;overflow:hidden; }
    .task-card::after { content:'';position:absolute;top:-50px;right:-50px;width:140px;height:140px;background:radial-gradient(circle,rgba(0,230,118,.18)0%,transparent 70%);pointer-events:none; }

    /* ── INTERVIEW CARD ── */
    .iv-question { font-size:15.5px;font-weight:600;line-height:1.5;color:rgba(255,255,255,.92);margin-bottom:14px; }
    .hint-btn { display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:var(--r-sm);background:rgba(255,208,77,.08);border:1px solid rgba(255,208,77,.22);color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s; }
    .hint-btn:hover { background:rgba(255,208,77,.14); }
    .hint-body { display:none;margin-top:12px;padding:14px 16px;border-radius:var(--r-sm);background:rgba(255,208,77,.06);border:1px solid rgba(255,208,77,.15);font-size:14px;line-height:1.65;color:var(--text-80);animation:panelIn .22s ease; }
    .hint-body.open { display:block; }

    /* ── STATS ── */
    .stat-row { display:flex;gap:10px;padding:0; }
    .stat-cell { flex:1;text-align:center;padding:15px 8px;border-radius:var(--r-sm);background:var(--glass);border:1px solid var(--glass-border); }
    .stat-val  { font-size:26px;font-weight:800;background:linear-gradient(130deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1; }
    .boss-mode .stat-val { background:linear-gradient(130deg,var(--boss-red),var(--boss-orange));-webkit-background-clip:text; }
    .stat-label { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-60);margin-top:4px; }

    /* ── GLOSSARY ── */
    .glossary-list { display:flex;flex-direction:column;gap:9px; }
    .glossary-item { padding:13px 15px;border-radius:var(--r-sm);background:rgba(255,107,170,.07);border:1px solid rgba(255,107,170,.16); }
    .glossary-term { font-size:13.5px;font-weight:700;color:var(--pink);margin-bottom:4px; }
    .glossary-def  { font-size:13px;line-height:1.55;color:var(--text-60); }

    /* ── QUIZ CARD ── */
    .quiz-card { background:rgba(45,212,191,.07);border-color:rgba(45,212,191,.2); }
    .quiz-intro { font-size:13px;color:var(--text-60);margin-bottom:14px;line-height:1.5; }
    .quiz-block { margin-bottom:20px; }
    .quiz-block:last-child { margin-bottom:0; }
    .quiz-q { font-size:14.5px;font-weight:600;line-height:1.5;color:rgba(255,255,255,.92);margin-bottom:10px; }
    .quiz-options { display:flex;flex-direction:column;gap:7px; }
    .quiz-btn {
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:10px;
      color:var(--text-80);cursor:pointer;font-size:13.5px;padding:11px 14px;text-align:left;
      transition:background .18s,border-color .18s;font-family:inherit;line-height:1.45;
    }
    .quiz-btn:hover:not(:disabled) { background:rgba(45,212,191,.1);border-color:rgba(45,212,191,.35); }
    .quiz-btn:disabled { cursor:default; }
    .quiz-btn.correct { background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.45);color:var(--green); }
    .quiz-btn.wrong   { background:rgba(255,67,83,.1);border-color:rgba(255,67,83,.4);color:var(--boss-red); }
    .quiz-feedback { display:none;margin-top:10px;padding:11px 14px;border-radius:10px;font-size:13.5px;line-height:1.5; }
    .quiz-feedback.show { display:block; }
    .quiz-feedback.ok   { background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);color:#86efac; }
    .quiz-feedback.fail { background:rgba(255,67,83,.08);border:1px solid rgba(255,67,83,.25);color:#fca5a5; }

    /* ── CLASSIFY QUIZ ── */
    .classify-list { display:flex;flex-direction:column;gap:8px; }
    .classify-item { padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px; }
    .classify-label { font-size:13.5px;line-height:1.4;color:var(--text-80);margin-bottom:8px; }
    .classify-btns  { display:flex;gap:6px;flex-wrap:wrap; }
    .cls-btn { border:1px solid rgba(255,255,255,.15);border-radius:7px;background:rgba(255,255,255,.05);color:var(--text-60);cursor:pointer;font-size:12px;font-weight:600;padding:6px 11px;transition:all .15s;font-family:inherit; }
    .cls-btn:hover:not(:disabled) { background:rgba(124,92,255,.15);border-color:rgba(124,92,255,.5); }
    .cls-btn.picked  { background:rgba(124,92,255,.2);border-color:rgba(124,92,255,.6);color:#c4b5fd;font-weight:700; }
    .cls-btn.correct { background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.45);color:var(--green); }
    .cls-btn.wrong   { background:rgba(255,67,83,.1);border-color:rgba(255,67,83,.4);color:var(--boss-red); }
    .cls-btn.reveal  { background:rgba(0,230,118,.07);border-color:rgba(0,230,118,.35);color:var(--green); }
    .cls-btn:disabled { cursor:default; }
    .check-btn { margin-top:12px;background:rgba(124,92,255,.12);border:1px solid rgba(124,92,255,.45);border-radius:9px;color:var(--accent2);cursor:pointer;font-size:13px;font-weight:700;padding:10px 20px;transition:all .2s;font-family:inherit; }
    .check-btn:hover:not(:disabled) { background:rgba(124,92,255,.25); }
    .check-btn:disabled { opacity:.5;cursor:default; }
    .check-result { display:none;margin-top:10px;padding:11px 14px;border-radius:10px;font-size:13.5px;background:rgba(124,92,255,.08);border:1px solid rgba(124,92,255,.25);color:var(--accent2); }
    .check-result.show { display:block; }

    /* ── BOSS SCENARIO ── */
    .boss-scenario-card { background:rgba(255,67,83,.07);border-color:rgba(255,67,83,.2); }
    .boss-q { background:rgba(0,0,0,.25);border-radius:9px;padding:10px 14px;margin-top:8px;font-size:13.5px;line-height:1.5;color:var(--gold); }
    .boss-q::before { content:'❓ '; }

    /* ── BOTTOM BAR ── */
    .bottom-bar { position:fixed;bottom:0;left:0;right:0;padding:14px 16px max(14px,env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(7,7,26,.98) 55%,transparent);z-index:300; }
    .done-btn { width:100%;padding:16px;border-radius:var(--r);border:none;cursor:pointer;background:linear-gradient(130deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;font-size:16px;font-weight:700;letter-spacing:.2px;box-shadow:0 8px 32px rgba(100,75,255,.38);transition:transform .18s,box-shadow .18s,background .4s; }
    .done-btn:active { transform:scale(.97); }
    .done-btn.success { background:linear-gradient(130deg,#00c875,#00e676)!important;box-shadow:0 8px 32px rgba(0,200,100,.35)!important; }
    .boss-mode .done-btn { background:linear-gradient(130deg,var(--boss-red) 0%,var(--boss-orange) 100%);box-shadow:0 8px 32px rgba(255,67,83,.38); }

    .hidden { display:none!important; }
  </style>
</head>
<body>

<div class="bg" id="bg">
  <div class="orb orb-1"></div><div class="orb orb-2"></div>
  <div class="orb orb-3"></div><div class="orb orb-4"></div>
</div>

<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <span class="pill pill-day" id="dayPill">
        <span class="muted">День</span><strong id="hDay">—</strong>
        <span class="muted">·</span><span class="muted">Нед.</span><strong id="hWeek">—</strong>
      </span>
      <span class="pill pill-xp" id="xpPill">⚡ <span id="hXP">0</span> XP</span>
    </div>
    <h1 class="lesson-title" id="hTitle">Загрузка...</h1>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="go('theory',this)">📚 Теория</button>
    <button class="tab-btn"        onclick="go('task',this)"  >🎯 Задание</button>
    <button class="tab-btn"        onclick="go('extra',this)" >💡 Ещё</button>
  </div>

  <!-- PANEL: THEORY -->
  <div class="panel active" id="p-theory">
    <div class="boss-banner" id="bossBanner">
      <div class="boss-banner-emoji">⚔️</div>
      <div class="boss-banner-title">Босс-битва!</div>
      <div class="boss-banner-sub">Финальный урок недели.<br>Покажи всё, чему научился.</div>
    </div>
    <div class="card" id="theoryCard">
      <div class="card-label">
        <div class="card-label-icon l-theory">📚</div>
        <span class="card-label-text">Теория</span>
      </div>
      <div class="body-text" id="theoryBody"></div>
    </div>
    <div id="quizSlot"></div>
    <div class="card book-card hidden" id="bookCard">
      <div class="card-label">
        <div class="card-label-icon l-book">📖</div>
        <span class="card-label-text">Из книги</span>
      </div>
      <div class="book-source" id="bookSource"></div>
      <div class="book-text"   id="bookBody"></div>
    </div>
  </div>

  <!-- PANEL: TASK -->
  <div class="panel" id="p-task">
    <div class="card task-card">
      <div class="card-label">
        <div class="card-label-icon l-task">🎯</div>
        <span class="card-label-text">Задание</span>
      </div>
      <div class="body-text" id="taskBody"></div>
    </div>
    <div class="card hidden" id="ivCard">
      <div class="card-label">
        <div class="card-label-icon l-iv">🎤</div>
        <span class="card-label-text">Вопрос на интервью</span>
      </div>
      <div class="iv-question" id="ivQ"></div>
      <div class="hint-btn" id="hintBtn" onclick="toggleHint()">💡 Показать подсказку</div>
      <div class="hint-body"  id="hintBody"></div>
    </div>
  </div>

  <!-- PANEL: EXTRA -->
  <div class="panel" id="p-extra">
    <div class="card" style="margin-bottom:12px;">
      <div class="stat-row">
        <div class="stat-cell"><div class="stat-val" id="sDday">—</div><div class="stat-label">День</div></div>
        <div class="stat-cell"><div class="stat-val" id="sWeek">—</div><div class="stat-label">Неделя</div></div>
        <div class="stat-cell"><div class="stat-val" id="sXP" style="font-size:20px;">—</div><div class="stat-label">Награда</div></div>
      </div>
    </div>
    <div class="card hidden" id="glossaryCard">
      <div class="card-label">
        <div class="card-label-icon l-glossary">📝</div>
        <span class="card-label-text">Глоссарий дня</span>
      </div>
      <div class="glossary-list" id="glossaryList"></div>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <button class="done-btn" id="doneBtn" onclick="done()">Урок прочитан ✓</button>
</div>

<script>
/* ================================================================
   LESSON DATA — Week 1
================================================================ */
const LESSONS = {
  1: {
    title: 'TL, Senior, PM — кто есть кто?',
    week: 1, xp: 150, isBoss: false,
    theory: `<p>Прежде чем становиться тимлидом, важно понять: а чем эта роль вообще отличается от того, что ты делаешь сейчас?</p>
<p><strong>Senior-разработчик</strong> — это эксперт. Он решает самые сложные технические задачи, пишет сложный код, помогает другим разобраться с техническими проблемами. Его главный результат — качественный код. Он работает «руками».</p>
<p><strong>Техлид (Tech Lead)</strong> — промежуточная роль. Всё ещё пишет код, но принимает технические решения за команду: выбирает архитектуру, проводит code review, устанавливает стандарты. Его продукт — качественная техническая база.</p>

</ul>
<p><em>После того как напишешь — попроси Клода дать обратную связь на твой ответ. Разберём вместе.</em></p>`,
    ivQ: 'Кейсы такого типа — стандарт на собесе TL. Именно так интервьюеры проверяют зрелость кандидата.',
    ivHint: 'После такой практики будешь чувствовать себя намного увереннее, когда подобный сценарий встретится на реальном интервью.',
    glossary: [],
    quiz: null
  }
};

/* ================================================================
   TELEGRAM INIT
================================================================ */
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

/* ================================================================
   PARSE URL PARAMS
================================================================ */
function getParams() {
  const q = new URLSearchParams(window.location.search);
  const safe = k => {
    const v = q.get(k);
    return v ? decodeURIComponent(v) : null;
  };
  return {
    day:   parseInt(safe('day') || '1', 10),
    week:  safe('week'),
    xp:    safe('xp'),
  };
}

/* ================================================================
   HELPERS
================================================================ */
function show(id)     { document.getElementById(id).classList.remove('hidden'); }
function setText(id,v){ document.getElementById(id).textContent = v; }
function setHTML(id,v){ document.getElementById(id).innerHTML   = v; }

/* ================================================================
   RENDER
================================================================ */
function render() {
  const p = getParams();
  const lesson = LESSONS[p.day] || LESSONS[1];

  const week = p.week || lesson.week;
  const xp   = p.xp   || lesson.xp;
  const boss = lesson.isBoss;

  // Boss mode
  if (boss) {
    document.getElementById('app').classList.add('boss-mode');
    document.getElementById('bg').classList.add('boss-mode');
    show('bossBanner');
    document.getElementById('xpPill').innerHTML = `⚔️ <span id="hXP">${xp}</span> XP`;
    document.getElementById('dayPill').querySelector('.pill-xp');
  }

  // Header
  setText('hDay',  p.day);
  setText('hWeek', week);
  setText('hXP',   xp);
  setText('hTitle', lesson.title);

  // Stats
  setText('sDday', p.day);
  setText('sWeek', week);
  setText('sXP',   xp + ' ⚡');

  // Theory
  setHTML('theoryBody', lesson.theory || '');

  // Quiz (in theory panel)
  if (lesson.quiz) {
    document.getElementById('quizSlot').innerHTML = lesson.quiz;
  }

  // Book
  if (lesson.bookText) {
    show('bookCard');
    setText('bookSource', lesson.bookTitle || 'Из книги');
    setHTML('bookBody',   lesson.bookText);
  }

  // Task
  setHTML('taskBody', lesson.task || '');

  // Interview
  if (lesson.ivQ) {
    show('ivCard');
    setText('ivQ', lesson.ivQ);
    if (lesson.ivHint) {
      setText('hintBody', lesson.ivHint);
    } else {
      document.getElementById('hintBtn').classList.add('hidden');
    }
  }

  // Glossary
  if (lesson.glossary && lesson.glossary.length) {
    show('glossaryCard');
    setHTML('glossaryList', lesson.glossary.map(t => `
      <div class="glossary-item">
        <div class="glossary-term">${t.term}</div>
        ${t.def ? `<div class="glossary-def">${t.def}</div>` : ''}
      </div>`).join(''));
  }
}

/* ================================================================
   TAB SWITCHING
================================================================ */
function go(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('p-' + id).classList.add('active');
  btn.classList.add('active');
}

/* ================================================================
   HINT TOGGLE
================================================================ */
function toggleHint() {
  const body = document.getElementById('hintBody');
  const btn  = document.getElementById('hintBtn');
  const open = body.classList.toggle('open');
  btn.textContent = open ? '✕ Скрыть подсказку' : '💡 Показать подсказку';
}

/* ================================================================
   QUIZ: MC (single choice)
================================================================ */
function quizCheck(btn, containerId) {
  const container = document.getElementById(containerId);
  const allBtns   = container.querySelectorAll('.quiz-btn');
  const feedback  = container.querySelector('.quiz-feedback');
  const isCorrect = btn.dataset.correct === 'true';

  allBtns.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === 'true') b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  const msg = isCorrect ? btn.dataset.ok : btn.dataset.fail;
  feedback.innerHTML = msg;
  feedback.classList.add('show', isCorrect ? 'ok' : 'fail');
}

/* ================================================================
   QUIZ: CLASSIFY (pick category for each item)
================================================================ */
function clsPick(btn) {
  const item = btn.closest('.classify-item');
  item.querySelectorAll('.cls-btn').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
}

function checkClassify(containerId, resultId) {
  const container = document.getElementById(containerId);
  const items  = container.querySelectorAll('.classify-item');
  const result = document.getElementById(resultId);

  let correct = 0;
  items.forEach(item => {
    const answer = item.dataset.answer;
    const picked = item.querySelector('.cls-btn.picked');
    const allBtns = item.querySelectorAll('.cls-btn');

    allBtns.forEach(b => { b.disabled = true; });

    if (!picked) {
      allBtns.forEach(b => { if (b.dataset.val === answer) b.classList.add('reveal'); });
    } else if (picked.dataset.val === answer) {
      picked.classList.add('correct');
      correct++;
    } else {
      picked.classList.add('wrong');
      allBtns.forEach(b => { if (b.dataset.val === answer) b.classList.add('reveal'); });
    }
  });

  const total = items.length;
  const pct   = Math.round((correct / total) * 100);
  result.textContent = `${correct} из ${total} верно (${pct}%) ${pct === 100 ? '🎉' : pct >= 70 ? '👍' : '📚 Прочитай теорию ещё раз'}`;
  result.classList.add('show');

  container.parentElement.querySelector('.check-btn').disabled = true;
}

/* ================================================================
   DONE BUTTON
================================================================ */
function done() {
  const btn = document.getElementById('doneBtn');
  const p   = getParams();
  const xp  = LESSONS[p.day]?.xp || p.xp || 150;

  btn.textContent = `✅ Отлично! +${xp} XP`;
  btn.classList.add('success');

  try { tg.sendData(JSON.stringify({ action: 'lesson_done', day: p.day })); } catch(_) {}
  setTimeout(() => { try { tg.close(); } catch(_) {} }, 1400);
}

/* ================================================================
   BOOT
================================================================ */
render();
</script>
</body>
</html>
